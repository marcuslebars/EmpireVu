# Force a Node runtime that runs `next start`.
#
# Railway/Nixpacks otherwise auto-detects a static Vite SPA, builds dist/, and serves
# it via Caddy with SPA-fallback — which means /api/* (including /api/intake) never
# reaches the Next server and every API route returns the SPA's index.html.
#
# `next start` serves the API handlers AND the built Vite SPA on a single origin
# (the single-origin consolidation). `npm run build` still runs vite build -> copy the
# SPA into public/ -> next build.
providers = ["node"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "npm run start"
